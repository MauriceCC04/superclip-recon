<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 880" font-family="'Inter', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arrow-end" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2a2a2a"/>
    </marker>
    <marker id="arrow-end-recon" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d8a6a"/>
    </marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- TITLE STRIP -->
  <text x="40" y="44" font-size="11" font-weight="700" letter-spacing="2" fill="#1d8a6a">METHOD</text>
  <text x="40" y="78" font-size="28" font-weight="700" fill="#1a1a1a">SuperCLIP-Recon — image-conditioned masked-token reconstruction</text>
  <text x="40" y="104" font-size="14" fill="#4a4a4a">Baseline pieces in gray; the only addition is a small reconstruction head (highlighted).</text>
  <line x1="40" y1="124" x2="1560" y2="124" stroke="#d8d4cc" stroke-width="1"/>

  <!-- LEGEND -->
  <g transform="translate(1140,42)">
    <rect x="0" y="0" width="14" height="14" fill="#e9e7e2" stroke="#b8b4ad" stroke-width="1"/>
    <text x="22" y="12" font-size="13" fill="#4a4a4a">Unchanged from SuperCLIP-style baseline</text>
    <rect x="0" y="22" width="14" height="14" fill="#e8f5f0" stroke="#1d8a6a" stroke-width="1.5"/>
    <text x="22" y="34" font-size="13" fill="#0f5a44" font-weight="600">New: reconstruction auxiliary loss</text>
  </g>

  <!-- INPUTS -->
  <g transform="translate(60,200)">
    <rect x="0" y="0" width="120" height="120" rx="6" fill="#f5f3ed" stroke="#b8b4ad" stroke-width="1.2"/>
    <rect x="12" y="12" width="96" height="60" fill="#cfd9d2"/>
    <circle cx="40" cy="42" r="14" fill="#a8b8af"/>
    <polygon points="56,72 100,72 78,40" fill="#94a89c"/>
    <rect x="12" y="80" width="96" height="28" fill="#e1ddd2"/>
    <text x="60" y="142" text-anchor="middle" font-size="16" fill="#1a1a1a" font-weight="500">Image x</text>
  </g>

  <g transform="translate(60,440)">
    <rect x="0" y="0" width="280" height="64" rx="6" fill="#f5f3ed" stroke="#b8b4ad" stroke-width="1.2"/>
    <text x="14" y="26" font-size="13" font-family="'JetBrains Mono', monospace" fill="#1a1a1a">"a dog chasing a red ball</text>
    <text x="14" y="46" font-size="13" font-family="'JetBrains Mono', monospace" fill="#1a1a1a">across a grassy field"</text>
    <text x="14" y="86" font-size="16" fill="#1a1a1a" font-weight="500">Caption t (CLIP-tokenized)</text>
    <text x="14" y="106" font-size="13" fill="#4a4a4a">12 token slots selected (mask rate 0.15)</text>
  </g>

  <!-- ENCODERS -->
  <g transform="translate(260,210)">
    <rect x="0" y="0" width="220" height="100" rx="6" fill="#e9e7e2" stroke="#b8b4ad" stroke-width="1.4"/>
    <text x="110" y="34" text-anchor="middle" font-size="18" fill="#1a1a1a" font-weight="600">CLIP ViT-B/32</text>
    <text x="110" y="56" text-anchor="middle" font-size="14" fill="#4a4a4a">image encoder</text>
    <text x="110" y="80" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', monospace" fill="#6b6b6b">OpenAI init · 512-d</text>
  </g>

  <g transform="translate(380,440)">
    <rect x="0" y="0" width="200" height="64" rx="6" fill="#e9e7e2" stroke="#b8b4ad" stroke-width="1.4"/>
    <text x="100" y="28" text-anchor="middle" font-size="18" fill="#1a1a1a" font-weight="600">CLIP text encoder</text>
    <text x="100" y="50" text-anchor="middle" font-size="14" fill="#4a4a4a">512-d, normalized</text>
  </g>

  <!-- EMBEDDINGS -->
  <g transform="translate(540,224)">
    <rect x="0" y="0" width="160" height="72" rx="36" fill="#1a1a1a"/>
    <text x="80" y="32" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', monospace" fill="#ffffff" font-weight="700">image_emb</text>
    <text x="80" y="52" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', monospace" fill="#cccccc">u_i  in R^512</text>
  </g>

  <g transform="translate(620,452)">
    <rect x="0" y="0" width="140" height="44" rx="22" fill="#4a4a4a"/>
    <text x="70" y="29" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', monospace" fill="#ffffff">text_emb  v_i</text>
  </g>

  <!-- ARROWS -->
  <line x1="180" y1="260" x2="258" y2="260" stroke="#2a2a2a" stroke-width="1.6" marker-end="url(#arrow-end)"/>
  <line x1="480" y1="260" x2="538" y2="260" stroke="#2a2a2a" stroke-width="1.6" marker-end="url(#arrow-end)"/>
  <line x1="340" y1="472" x2="378" y2="472" stroke="#2a2a2a" stroke-width="1.6" marker-end="url(#arrow-end)"/>
  <line x1="580" y1="474" x2="618" y2="474" stroke="#2a2a2a" stroke-width="1.6" marker-end="url(#arrow-end)"/>

  <!-- BRANCHING BUS -->
  <line x1="700" y1="260" x2="780" y2="260" stroke="#2a2a2a" stroke-width="1.6"/>
  <line x1="780" y1="160" x2="780" y2="380" stroke="#2a2a2a" stroke-width="1.6"/>
  <line x1="780" y1="160" x2="858" y2="160" stroke="#2a2a2a" stroke-width="1.6" marker-end="url(#arrow-end)"/>
  <line x1="780" y1="260" x2="858" y2="260" stroke="#2a2a2a" stroke-width="1.6" marker-end="url(#arrow-end)"/>
  <line x1="780" y1="380" x2="858" y2="380" stroke="#1d8a6a" stroke-width="2.2" marker-end="url(#arrow-end-recon)"/>

  <!-- HEAD 1: Contrastive -->
  <g transform="translate(860,128)">
    <rect x="0" y="0" width="320" height="64" rx="6" fill="#e9e7e2" stroke="#b8b4ad" stroke-width="1.4"/>
    <text x="160" y="26" text-anchor="middle" font-size="18" fill="#1a1a1a" font-weight="600">Contrastive alignment</text>
    <text x="160" y="48" text-anchor="middle" font-size="13" fill="#4a4a4a">u_i · v_i  vs in-batch negatives  →  L_CLIP</text>
  </g>
  <path d="M 690 472 Q 850 472 850 200 L 858 178" fill="none" stroke="#2a2a2a" stroke-width="1.6" marker-end="url(#arrow-end)"/>

  <!-- HEAD 2: Token classification -->
  <g transform="translate(860,228)">
    <rect x="0" y="0" width="320" height="64" rx="6" fill="#e9e7e2" stroke="#b8b4ad" stroke-width="1.4"/>
    <text x="160" y="26" text-anchor="middle" font-size="18" fill="#1a1a1a" font-weight="600">Token-classification head</text>
    <text x="160" y="48" text-anchor="middle" font-size="13" fill="#4a4a4a">linear → top-1000 COCO vocab  →  L_tok</text>
  </g>

  <!-- HEAD 3: RECONSTRUCTION -->
  <g transform="translate(860,328)" filter="url(#soft-shadow)">
    <rect x="0" y="0" width="660" height="200" rx="8" fill="#e8f5f0" stroke="#1d8a6a" stroke-width="2"/>

    <rect x="14" y="12" width="44" height="20" rx="3" fill="#1d8a6a"/>
    <text x="36" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1.5">NEW</text>
    <text x="68" y="28" font-size="18" fill="#0f5a44" font-weight="700">Reconstruction head</text>
    <text x="68" y="50" font-size="13" fill="#0f5a44">Predicts masked caption tokens from the image embedding alone (no text context)</text>

    <g transform="translate(20,72)">
      <rect x="0" y="0" width="86" height="36" rx="4" fill="#1a1a1a"/>
      <text x="43" y="23" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', monospace" fill="#ffffff">u_i (512)</text>
    </g>
    <text x="116" y="96" font-size="20" fill="#0f5a44" font-weight="700">⊕</text>
    <g transform="translate(140,64)">
      <rect x="0" y="0" width="140" height="56" rx="4" fill="#ffffff" stroke="#1d8a6a" stroke-width="1.4"/>
      <text x="70" y="22" text-anchor="middle" font-size="14" fill="#0f5a44" font-weight="700">slot embedding</text>
      <text x="70" y="42" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', monospace" fill="#0f5a44">s_k in R^64, k=1..12</text>
    </g>
    <line x1="284" y1="92" x2="312" y2="92" stroke="#1d8a6a" stroke-width="2.2" marker-end="url(#arrow-end-recon)"/>
    <g transform="translate(312,64)">
      <rect x="0" y="0" width="160" height="56" rx="4" fill="#ffffff" stroke="#1d8a6a" stroke-width="1.4"/>
      <text x="80" y="22" text-anchor="middle" font-size="14" fill="#0f5a44" font-weight="700">2-layer MLP</text>
      <text x="80" y="42" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', monospace" fill="#0f5a44">512 → 512 → V</text>
    </g>
    <line x1="476" y1="92" x2="504" y2="92" stroke="#1d8a6a" stroke-width="2.2" marker-end="url(#arrow-end-recon)"/>
    <g transform="translate(504,64)">
      <rect x="0" y="0" width="138" height="56" rx="4" fill="#0f5a44"/>
      <text x="69" y="22" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="700">vocab logits</text>
      <text x="69" y="42" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', monospace" fill="#d8ece4">V = 49,408</text>
    </g>

    <g transform="translate(20,144)">
      <text x="0" y="0" font-size="14" fill="#0f5a44" font-weight="600">Supervision</text>
      <text x="0" y="20" font-size="13" fill="#4a4a4a">slot k predicts the k-th masked token (cross-entropy; padded slots ignored)</text>
      <g transform="translate(380,-12)">
        <rect x="0" y="0" width="36" height="22" rx="3" fill="#ffffff" stroke="#1d8a6a"/>
        <text x="18" y="16" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', monospace" fill="#1a1a1a">m1</text>
        <rect x="44" y="0" width="36" height="22" rx="3" fill="#ffffff" stroke="#1d8a6a"/>
        <text x="62" y="16" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', monospace" fill="#1a1a1a">m2</text>
        <rect x="88" y="0" width="36" height="22" rx="3" fill="#ffffff" stroke="#1d8a6a"/>
        <text x="106" y="16" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', monospace" fill="#1a1a1a">m3</text>
        <text x="132" y="16" font-size="13" font-family="'JetBrains Mono', monospace" fill="#0f5a44">…</text>
        <rect x="152" y="0" width="44" height="22" rx="3" fill="#ffffff" stroke="#1d8a6a"/>
        <text x="174" y="16" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', monospace" fill="#1a1a1a">m12</text>
        <text x="208" y="16" font-size="14" fill="#0f5a44" font-weight="700">→ L_recon</text>
      </g>
    </g>
  </g>

  <!-- TOTAL LOSS STRIP -->
  <g transform="translate(40,680)">
    <line x1="0" y1="0" x2="1520" y2="0" stroke="#d8d4cc" stroke-width="1"/>
    <text x="0" y="32" font-size="11" font-weight="700" letter-spacing="2" fill="#1d8a6a">TRAINING OBJECTIVE</text>

    <g transform="translate(0,52)">
      <text x="0" y="36" font-size="26" fill="#1a1a1a" font-weight="700">L_total</text>
      <text x="110" y="36" font-size="26" fill="#1a1a1a" font-weight="700">=</text>
      <text x="140" y="36" font-size="26" fill="#4a4a4a" font-weight="600">L_CLIP</text>
      <text x="252" y="36" font-size="26" fill="#4a4a4a" font-weight="600">+</text>
      <text x="282" y="36" font-size="26" fill="#4a4a4a" font-weight="600">L_tok</text>
      <text x="372" y="36" font-size="26" fill="#4a4a4a" font-weight="600">+</text>
      <text x="402" y="36" font-size="26" fill="#0f5a44" font-weight="700">λ_recon · L_recon</text>

      <text x="402" y="64" font-size="13" fill="#0f5a44" font-weight="600">added in this work · main λ_recon = 1.0</text>
    </g>

    <g transform="translate(900,40)">
      <rect x="0" y="0" width="620" height="100" rx="6" fill="#fafaf7" stroke="#1d8a6a" stroke-width="1.4"/>
      <text x="20" y="26" font-size="11" font-weight="700" letter-spacing="2" fill="#0f5a44">WHY THIS IS LIGHTWEIGHT</text>
      <text x="20" y="52" font-size="14" fill="#1a1a1a">• one MLP head, no decoder, no extra backbone, no extra dataset</text>
      <text x="20" y="74" font-size="14" fill="#1a1a1a">• image features alone predict the masked tokens (no text context)</text>
      <text x="20" y="92" font-size="14" fill="#0f5a44" font-weight="600">• observed runtime overhead ≈ 0.9% (3648 → 3680 s)</text>
    </g>
  </g>

  <text x="40" y="838" font-size="13" font-style="italic" fill="#4a4a4a">Figure 1. Training pipeline. Contrastive and token-classification heads form the SuperCLIP-style baseline (gray). The reconstruction head (green) takes the image embedding,</text>
  <text x="40" y="858" font-size="13" font-style="italic" fill="#4a4a4a">concatenates a learned slot embedding, and predicts the k-th masked caption token through a small 2-layer MLP into the CLIP vocabulary. Padded slots are excluded from the loss.</text>
</svg>
